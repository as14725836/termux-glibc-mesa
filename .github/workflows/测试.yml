name: 测试版 Mesa (aarch64, Auto Update + Detailed Log)
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'refs/tags/**'
  schedule:
    - cron: "0 22 * * *"
permissions:
  contents: write
  actions: write
jobs:
  check-updates:
    runs-on: ubuntu-24.04-arm
    outputs:
      new_commit: ${{ steps.check.outputs.new_commit }}
      latest_hash: ${{ steps.check.outputs.latest_hash }}
    steps:
      - name: 检查 Mesa 上游更新
        id: check
        run: |
          echo "🔍 检查 Mesa 上游提交..."
          LATEST_HASH=$(git ls-remote https://gitlab.freedesktop.org/mesa/mesa.git refs/heads/main | awk '{print $1}')
          echo "最新上游提交: $LATEST_HASH"
          
          STATE_FILE=".mesa_latest_commit"
          if [ -f "$STATE_FILE" ]; then
            LAST_HASH=$(cat $STATE_FILE)
          else
            LAST_HASH=""
          fi
          echo "上次构建: $LAST_HASH"
          
          if [ "$LATEST_HASH" != "$LAST_HASH" ]; then
            echo "new_commit=true" >> $GITHUB_OUTPUT
            echo "latest_hash=$LATEST_HASH" >> $GITHUB_OUTPUT
          else
            echo "new_commit=false" >> $GITHUB_OUTPUT
          fi
  build:
    needs: check-updates
    if: ${{ needs.check-updates.outputs.new_commit == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 显示构建环境信息
        run: |
          lsb_release -a || true
          uname -a
          lscpu | grep -E 'Model name|Architecture|CPU MHz|Core'
          free -h
          df -h
      
      - name: 安装依赖
        run: |
          sudo sed -i "s/^Types: deb$/Types: deb deb-src/" /etc/apt/sources.list.d/ubuntu.sources
          sudo apt update
          sudo apt install -y glslang-tools libxrandr-dev libxxf86vm-dev libxcb-shm0-dev libxcb-glx0-dev \
            libxext-dev llvm-19 libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri3-dev libxcb-present-dev \
            libxcb-randr0-dev libxcb-sync-dev libxcb-xfixes0-dev libxshmfence-dev libdrm-dev \
            libgbm-dev libegl1-mesa-dev libexpat1-dev libwayland-dev python3-pip
          pip3 install --user meson ninja mako
      
      - name: 克隆 Mesa 正式版
        run: |
          echo "📥 克隆 Mesa 仓库..."
          git clone https://github.com/lfdevs/mesa-for-android-container.git mesa
          cd mesa
          git checkout dev/adreno-main
          git pull
          echo "🧾 当前分支和提交:"
          git branch -v
          git log -1 --oneline --decorate
          
      - name: 自定义品牌
        run: |
          echo "🔧 自定义品牌: Turnip → Qualcomm Snapdragon"
          cd mesa
          sed -i 's/Turnip Adreno (TM) %s%s/Qualcomm Snapdragon Adreno (TM) %s%s/' src/freedreno/vulkan/tu_device.cc
          sed -i 's/"turnip Mesa driver"/"Qualcomm Snapdragon Driver"/' src/freedreno/vulkan/tu_device.cc
          sed -i 's/"Mesa " PACKAGE_VERSION MESA_GIT_SHA1/"Qualcomm Snapdragon " PACKAGE_VERSION MESA_GIT_SHA1/' src/freedreno/vulkan/tu_device.cc
          #sed -i '/A8XX_SP_UNKNOWN_A9A8/s/^/# /' src/freedreno/common/freedreno_devices.py

          echo "性能回归修复测试"
          sed -i '876s/0x0000003f/0x1f1f/
          927s/0x0000003f/0x1f1f/
          1176s/0x0000003f/0x1f1f/' src/freedreno/common/freedreno_devices.py

          sed -i 's/\[A6XXRegs\.REG_A6XX_PC_MODE_CNTL, 0x1f\],/[A6XXRegs.REG_A6XX_PC_MODE_CNTL, 0x1f1f],/g' src/freedreno/common/freedreno_devices.py

          sed -i '876s/,  # 0x00001f1f in some tests//
          925,926d
          876s/0x1f1f]/0x1f1f],/' src/freedreno/common/freedreno_devices.py

          sed -i '3289c\
          \t<reg32 offset="0x9804" name="PC_MODE_CNTL" low="0" high="7" variants="A6XX-A7XX" usage="draw">\
          \t\t<!-- \
          \t\t\tThe higher this is set, the faster primitive processing performance\
          \t\t\tends up being. It is likely the amount of entries to process/fetch.\
          \t\t-->\
          \t\t<bitfield name="COUNT1" low="0" high="4" type="uint"\/>\
          \t\t<!--\
          \t\t\tSetting this slows down primitive processing substantially, but it\
          \t\t\twas noted to fix some vertex corruption issues in the past. Likely\
          \t\t\tserves as a workaround to serialize the primitive pipeline?\
          \t\t-->\
          \t\t<bitfield name="UNK5" pos="5" type="boolean"\/>\
          \t\t<!-- Never set by the blob, removed in A7XX. Unclear impact. -->\
          \t\t<bitfield name="UNK6" pos="6" type="boolean" variants="A6XX"\/>\
          \t\t<!-- Never set by the blob. Unclear impact. -->\
          \t\t<bitfield name="UNK7" pos="7" type="boolean"\/>\
          \t\t<!--\
          \t\t\tSame as COUNT1 but one bit larger, this replaces COUNT1 mid-A7XX but\
          \t\t\tthe proprietary driver tends to set it to the same or larger value\
          \t\t\t(by using the extra bit) as COUNT1.\
          \t\t-->\
          \t\t<bitfield name="COUNT2" low="8" high="13" type="uint" variants="A7XX-"\/>\
          \t<\/reg32>' src/freedreno/registers/adreno/a6xx.xml

          sed -i '/com.termux/d' src/freedreno/registers/adreno/a6xx.xml
          sed -i 's/<--- /<!-- /g' src/freedreno/registers/adreno/a6xx.xml
          sed -i '3290d' src/freedreno/registers/adreno/a6xx.xml
          sed -i '3289a\\t\t<!--' src/freedreno/registers/adreno/a6xx.xml
          
      - name: 构建 Mesa
        run: |
          cd mesa
          BUILD_START=$(date +%s)
          sudo mkdir -p /data/data/com.termux/files/usr/glibc
          sudo chmod 777 -R /data

          # 设置编译器和环境变量
          export CC=clang
          export CXX=clang++
          export CFLAGS="-O3 -fno-plt -flto=thin -Wno-error -Wno-deprecated-declarations"
          export CXXFLAGS="-O3 -fno-plt -flto=thin -Wno-error -Wno-deprecated-declarations"
          export LDFLAGS="-flto=thin"
          
          mkdir -p builddir
          meson setup builddir \
            --libdir=lib \
            -Dprefix=/data/data/com.termux/files/usr/glibc \
            -Dbuildtype=release \
            -Dplatforms=x11 \
            -Degl-native-platform=x11 \
            -Dglx=dri \
            -Dglx-direct=true \
            -Dopengl=true \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dglvnd=disabled \
            -Degl=disabled \
            -Dllvm=enabled \
            -Dshared-llvm=enabled \
            -Dshader-cache=enabled \
            -Dshared-glapi=enabled \
            -Dxlib-lease=enabled \
            -Dvulkan-beta=true \
            -Dlibunwind=disabled \
            -Dvalgrind=disabled \
            -Dmicrosoft-clc=disabled \
            -Dgallium-rusticl=false \
            -Dgallium-drivers=zink,freedreno,virgl,llvmpipe,softpipe \
            -Dgallium-rusticl-enable-drivers=freedreno \
            -Dshader-cache-default=true \
            -Dvulkan-drivers=freedreno,swrast,virtio \
            -Dfreedreno-kmds=kgsl \
            -Dvideo-codecs=all \
            -Db_ndebug=true \
            -Dstrip=true
          
          ninja -C builddir -j$(nproc)
          ninja -C builddir install
          
          BUILD_END=$(date +%s)
          echo "构建耗时: $((BUILD_END - BUILD_START)) 秒"
          
          VERSION=$(cat VERSION)
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "GIT_HASH=${GIT_HASH}" >> $GITHUB_ENV
      
      - name: 打包构建产物
        run: |
          echo "📦 开始打包 Mesa 产物..."
          cd mesa
          PACK_START=$(date +%s)
          
          TAR_NAME="termux-glibc-mesa-${VERSION}-aarch64.tar.gz"
          tar -czvf "../${TAR_NAME}" -C builddir/src/freedreno/vulkan libvulkan_freedreno.so
          
          FULL_TAR="glibc-mesa-${VERSION}-aarch64.tar.gz"
          tar -czvf "../${FULL_TAR}" -C /data/data/com.termux/files/usr glibc
          
          cd ..
          sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"
          sha256sum "${FULL_TAR}" > "${FULL_TAR}.sha256"
          
          PACK_END=$(date +%s)
          echo "打包耗时: $((PACK_END - PACK_START)) 秒"
          
          echo "TAR_NAME=${TAR_NAME}" >> $GITHUB_ENV
          echo "FULL_TAR=${FULL_TAR}" >> $GITHUB_ENV
      
      - name: 上传构建产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-artifacts-${{ env.VERSION }}-aarch64
          path: |
            ${{ env.TAR_NAME }}
            ${{ env.FULL_TAR }}
            ${{ env.TAR_NAME }}.sha256
            ${{ env.FULL_TAR }}.sha256
      
      - name: 保存最新提交记录
        if: ${{ needs.check-updates.outputs.latest_hash != '' }}
        run: |
          echo "${{ needs.check-updates.outputs.latest_hash }}" > .mesa_latest_commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .mesa_latest_commit || true
          git commit -m "Update Mesa commit record" || true
          git push || true
      
      - name: 输出总结信息
        run: |
          echo "构建完成"
          echo "版本: ${{ env.VERSION }}"
          echo "提交: ${{ env.GIT_HASH }}"
          echo "构建产物已保存到 Artifacts"
          echo "- ${{ env.TAR_NAME }}"
          echo "- ${{ env.FULL_TAR }}"
