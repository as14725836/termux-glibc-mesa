name: proot Mesa (aarch64, Auto Update + Detailed Log)
on:
  workflow_dispatch:
    inputs:
      mesa_version:
        description: 'Mesa 版本号 (留空则使用最新main分支，例如: 25.1.2, mesa-25.1.2, 24.3.4)'
        required: false
        type: string
        default: ''
  push:
    branches:
      - main
      - 'refs/tags/**'
  schedule:
    - cron: "0 22 * * *"
permissions:
  contents: write
  actions: write
jobs:
  check-updates:
    runs-on: ubuntu-24.04-arm
    outputs:
      new_commit: ${{ steps.check.outputs.new_commit }}
      latest_hash: ${{ steps.check.outputs.latest_hash }}
      mesa_version: ${{ steps.version.outputs.mesa_version }}
      mesa_ref: ${{ steps.version.outputs.mesa_ref }}
    steps:
      - name: 确定 Mesa 源码版本/分支
        id: version
        run: |
          # 检查是否为手动触发并指定了版本
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.mesa_version }}" ]; then
            USER_VERSION="${{ inputs.mesa_version }}"
            
            # 自动处理版本号格式
            # 如果输入的是纯版本号（如 25.1.2），自动添加 mesa- 前缀
            if [[ "$USER_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              # 检查是否已经有 mesa- 前缀
              if [[ ! "$USER_VERSION" =~ ^mesa- ]]; then
                MESA_REF="mesa-$USER_VERSION"
                echo "自动添加 mesa- 前缀: $USER_VERSION -> $MESA_REF"
              else
                MESA_REF="$USER_VERSION"
              fi
            else
              MESA_REF="$USER_VERSION"
            fi
            
            echo "mesa_ref=$MESA_REF" >> $GITHUB_OUTPUT
            echo "mesa_version=$USER_VERSION" >> $GITHUB_OUTPUT
            echo "使用指定的版本: $USER_VERSION -> $MESA_REF"
          else
            # 自动模式：使用 main 分支最新提交
            echo "mesa_ref=main" >> $GITHUB_OUTPUT
            echo "mesa_version=auto-main" >> $GITHUB_OUTPUT
            echo "使用自动模式: main 分支"
          fi
      
      - name: 检查 Mesa 上游更新
        id: check
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mesa_version == '' }}
        run: |
          echo "🔍 检查 Mesa 上游提交..."
          LATEST_HASH=$(git ls-remote https://gitlab.freedesktop.org/mesa/mesa.git refs/heads/main | awk '{print $1}')
          echo "最新上游提交: $LATEST_HASH"
          
          STATE_FILE=".mesa_latest_commit"
          if [ -f "$STATE_FILE" ]; then
            LAST_HASH=$(cat $STATE_FILE)
          else
            LAST_HASH=""
          fi
          echo "上次构建: $LAST_HASH"
          
          if [ "$LATEST_HASH" != "$LAST_HASH" ]; then
            echo "new_commit=true" >> $GITHUB_OUTPUT
            echo "latest_hash=$LATEST_HASH" >> $GITHUB_OUTPUT
          else
            echo "new_commit=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 手动模式跳过更新检查
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mesa_version != '' }}
        run: |
          echo "manual_build=true" >> $GITHUB_OUTPUT
          echo "手动构建模式，跳过自动更新检测"

  build:
    needs: check-updates
    if: |
      needs.check-updates.outputs.new_commit == 'true' || 
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 显示构建环境信息
        run: |
          lsb_release -a || true
          uname -a
          lscpu | grep -E 'Model name|Architecture|CPU MHz|Core'
          free -h
          df -h
      
      - name: 安装依赖
        run: |
          sudo sed -i "s/^Types: deb$/Types: deb deb-src/" /etc/apt/sources.list.d/ubuntu.sources
          sudo apt update
          sudo apt install -y glslang-tools libxrandr-dev libxxf86vm-dev libxcb-shm0-dev libxcb-glx0-dev \
            libxext-dev llvm-19 libwayland-egl-backend-dev libx11-dev libx11-xcb-dev libxcb1-dev libxcb-dri3-dev libxcb-present-dev \
            libxcb-randr0-dev libxcb-sync-dev libxcb-xfixes0-dev libxshmfence-dev libdrm-dev \
            libgbm-dev libegl1-mesa-dev libexpat1-dev libwayland-dev python3-pip
          pip3 install --user meson ninja mako
      
      - name: 克隆 Mesa 源码
        run: |
          echo "📥 克隆 Mesa 仓库..."
          MESA_REF="${{ needs.check-updates.outputs.mesa_ref }}"
          
          echo "目标引用: $MESA_REF"
          
          # 创建临时目录测试引用类型
          mkdir -p /tmp/mesa-test
          cd /tmp/mesa-test
          git init
          git remote add origin https://gitlab.freedesktop.org/mesa/mesa.git
          git fetch --depth=1 origin 2>/dev/null
          
          REF_TYPE="unknown"
          ACTUAL_REF=""
          
          # 检查是否为 tag
          if git ls-remote --tags origin | grep -q "refs/tags/$MESA_REF$"; then
            REF_TYPE="tag"
            ACTUAL_REF="$MESA_REF"
            echo "✅ 检测到 Tag: $MESA_REF"
          # 检查是否为分支
          elif git ls-remote --heads origin | grep -q "refs/heads/$MESA_REF$"; then
            REF_TYPE="branch"
            ACTUAL_REF="$MESA_REF"
            echo "✅ 检测到分支: $MESA_REF"
          # 检查是否为 commit hash (7-40位十六进制)
          elif [[ "$MESA_REF" =~ ^[0-9a-f]{7,40}$ ]]; then
            REF_TYPE="commit"
            ACTUAL_REF="$MESA_REF"
            echo "✅ 检测到 Commit: $MESA_REF"
          else
            echo "⚠️ 未找到 $MESA_REF，尝试查找相近的 tag..."
            # 尝试查找包含该字符串的 tag
            MATCHING_TAG=$(git ls-remote --tags origin | grep "$MESA_REF" | head -1 | awk -F'refs/tags/' '{print $2}' | sed 's/\^{}//')
            if [ -n "$MATCHING_TAG" ]; then
              REF_TYPE="tag"
              ACTUAL_REF="$MATCHING_TAG"
              echo "✅ 找到匹配的 Tag: $ACTUAL_REF"
            else
              echo "❌ 无法识别引用: $MESA_REF"
              echo ""
              echo "最近的 Mesa 版本:"
              git ls-remote --tags origin | grep -E 'refs/tags/mesa-[0-9]+\.[0-9]+\.[0-9]+$' | tail -10 | awk -F'refs/tags/' '{print "  - " $2}'
              exit 1
            fi
          fi
          
          cd "$GITHUB_WORKSPACE"
          
          # 根据类型克隆
          case "$REF_TYPE" in
            "tag")
              echo "📌 克隆 Tag: $ACTUAL_REF"
              git clone --branch "$ACTUAL_REF" --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa 2>&1 || {
                echo "深度克隆失败，尝试完整克隆..."
                git clone https://gitlab.freedesktop.org/mesa/mesa.git mesa
                cd mesa
                git checkout "tags/$ACTUAL_REF"
                cd ..
              }
              ;;
            "branch")
              echo "🌿 克隆分支: $ACTUAL_REF"
              git clone --branch "$ACTUAL_REF" --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa
              ;;
            "commit")
              echo "🔖 克隆 Commit: $ACTUAL_REF"
              git clone --depth 100 https://gitlab.freedesktop.org/mesa/mesa.git mesa
              cd mesa
              git fetch --depth=100 origin
              git checkout "$ACTUAL_REF"
              cd ..
              ;;
            *)
              echo "📖 使用 main 分支"
              git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git mesa
              ;;
          esac
          
          # 验证克隆结果
          if [ ! -d "mesa" ]; then
            echo "❌ 克隆失败"
            exit 1
          fi
          
          cd mesa
          
          # 获取版本信息
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
          else
            VERSION=$(git describe --tags --always 2>/dev/null | sed 's/^mesa-//' || echo "custom")
          fi
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "GIT_HASH=${GIT_HASH}" >> $GITHUB_ENV
          echo "MESA_REF=${ACTUAL_REF:-$MESA_REF}" >> $GITHUB_ENV
          
          echo "✅ 克隆完成"
          echo "版本: $VERSION"
          echo "提交: $GIT_HASH"
          echo "引用: ${ACTUAL_REF:-$MESA_REF}"
      
      - name: 自定义品牌
        run: |
          echo "🔧 自定义品牌: Turnip → Qualcomm Snapdragon"
          cd mesa
          # 检查文件是否存在（不同版本路径可能不同）
          if [ -f "src/freedreno/vulkan/tu_device.cc" ]; then
            sed -i 's/Turnip Adreno (TM) %s%s/Qualcomm Snapdragon Adreno (TM) %s%s/' src/freedreno/vulkan/tu_device.cc
            sed -i 's/"turnip Mesa driver"/"Qualcomm Snapdragon Driver"/' src/freedreno/vulkan/tu_device.cc
            sed -i 's/"Mesa " PACKAGE_VERSION MESA_GIT_SHA1/"Qualcomm Snapdragon " PACKAGE_VERSION MESA_GIT_SHA1/' src/freedreno/vulkan/tu_device.cc
            echo "品牌自定义完成"
          else
            echo "⚠️ 品牌文件不存在，跳过自定义"
          fi
      
      - name: 构建 Mesa
        run: |
          cd mesa
          BUILD_START=$(date +%s)
          sudo mkdir -p /opt/mesa
          sudo chmod 777 -R /opt
          
          mkdir -p builddir
          meson setup builddir \
            --libdir=lib \
            -Dprefix=/opt/mesa \
            -Dbuildtype=release \
            -Dplatforms=x11,wayland \
            -Degl-native-platform=wayland \
            -Dglx=dri \
            -Dglx-direct=true \
            -Dopengl=true \
            -Dgles1=enabled \
            -Dgles2=enabled \
            -Dglvnd=disabled \
            -Degl=enabled \
            -Dllvm=disabled \
            -Dshared-llvm=disabled \
            -Dshader-cache=enabled \
            -Dshared-glapi=enabled \
            -Dxlib-lease=enabled \
            -Dvulkan-beta=true \
            -Dlibunwind=disabled \
            -Dvalgrind=disabled \
            -Dmicrosoft-clc=disabled \
            -Dgallium-rusticl=false \
            -Dgallium-extra-hud=true \
            -Dgallium-drivers=zink,freedreno \
            -Dshader-cache-default=true \
            -Dvulkan-drivers=freedreno \
            -Dfreedreno-kmds=msm,kgsl \
            -Dvideo-codecs=all \
            -Dgbm=enabled \
            -Dtools=drm-shim,freedreno \
            -Db_ndebug=true \
            -Dstrip=true
          
          ninja -C builddir -j$(nproc)
          ninja -C builddir install
          
          BUILD_END=$(date +%s)
          echo "构建耗时: $((BUILD_END - BUILD_START)) 秒"
      
      - name: 打包构建产物
        run: |
          echo "📦 开始打包 Mesa 产物..."
          cd mesa
          PACK_START=$(date +%s)
          
          # 清理版本号中的特殊字符
          SAFE_VERSION=$(echo "${{ env.VERSION }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          SAFE_HASH=$(echo "${{ env.GIT_HASH }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          
          TAR_NAME="proot-mesa-${SAFE_VERSION}-${SAFE_HASH}-aarch64.tar.gz"
          FULL_TAR="proot-mesa-full-${SAFE_VERSION}-${SAFE_HASH}-aarch64.tar.gz"
          
          # 只打包 vulkan 驱动
          if [ -f "builddir/src/freedreno/vulkan/libvulkan_freedreno.so" ]; then
            tar -czf "../${TAR_NAME}" -C builddir/src/freedreno/vulkan libvulkan_freedreno.so
            echo "✅ 打包 Vulkan 驱动: ${TAR_NAME}"
          else
            echo "⚠️ 未找到 libvulkan_freedreno.so"
          fi
          
          # 打包完整目录
          tar -czf "../${FULL_TAR}" -C /opt mesa
          echo "✅ 打包完整 Mesa: ${FULL_TAR}"
          
          cd ..
          [ -f "${TAR_NAME}" ] && sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"
          [ -f "${FULL_TAR}" ] && sha256sum "${FULL_TAR}" > "${FULL_TAR}.sha256"
          
          PACK_END=$(date +%s)
          echo "打包耗时: $((PACK_END - PACK_START)) 秒"
          
          echo "TAR_NAME=${TAR_NAME}" >> $GITHUB_ENV
          echo "FULL_TAR=${FULL_TAR}" >> $GITHUB_ENV
      
      - name: 上传构建产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mesa-artifacts-${{ env.VERSION }}-${{ env.GIT_HASH }}-aarch64
          path: |
            ${{ env.TAR_NAME }}
            ${{ env.FULL_TAR }}
            ${{ env.TAR_NAME }}.sha256
            ${{ env.FULL_TAR }}.sha256
          retention-days: 7
      
      - name: 创建 GitHub Release (仅手动构建或 tag 推送)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.mesa_version != '') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mesa-${{ env.VERSION }}-${{ env.GIT_HASH }}
          name: "Mesa ${{ env.VERSION }} (${{ env.GIT_HASH }}) for aarch64"
          body: |
            ## Mesa 构建版本: ${{ env.VERSION }}
            - Git 提交: ${{ env.GIT_HASH }}
            - 构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - 架构: aarch64
            - 包含驱动: freedreno (Turnip Vulkan), zink (OpenGL)
            
            ### 使用方法
            ```bash
            # 1. 解压到 proot 容器
            tar -xzf proot-mesa-full-*.tar.gz -C /
            
            # 2. 设置环境变量
            export LD_LIBRARY_PATH=/opt/mesa/lib:\$LD_LIBRARY_PATH
            export VK_ICD_FILENAMES=/opt/mesa/share/vulkan/icd.d/freedreno_icd.arm64.json
            
            # 3. 验证安装
            vulkaninfo --summary
            ```
          files: |
            ${{ env.TAR_NAME }}
            ${{ env.FULL_TAR }}
            ${{ env.TAR_NAME }}.sha256
            ${{ env.FULL_TAR }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 保存最新提交记录 (仅自动模式)
        if: ${{ needs.check-updates.outputs.latest_hash != '' && github.event_name != 'workflow_dispatch' }}
        run: |
          echo "${{ needs.check-updates.outputs.latest_hash }}" > .mesa_latest_commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .mesa_latest_commit || true
          git commit -m "Update Mesa commit record" || true
          git push || true
      
      - name: 输出总结信息
        run: |
          echo "=========================================="
          echo "✅ 构建完成！"
          echo "Mesa 版本: ${{ env.VERSION }}"
          echo "Git 提交: ${{ env.GIT_HASH }}"
          echo "源码来源: ${{ needs.check-updates.outputs.mesa_ref }}"
          echo "构建产物已保存到 Artifacts"
          echo "- ${{ env.TAR_NAME }}"
          echo "- ${{ env.FULL_TAR }}"
          echo "=========================================="
