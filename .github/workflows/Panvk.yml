name: PanVK kbase release packages

'on':
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to create or update
        required: false
        type: string
  push:
    tags:
      - 'kbase-v*'

permissions:
  contents: write

jobs:
  build-packages:
    name: Build Ubuntu 24.04 ARM tarball
    runs-on: ubuntu-24.04-arm
    env:
      BUILD_DIR: build-release-ubuntu2404
      PACKAGE_NAME: mesa-panvk-kbase
      TARGET: ubuntu2404
      LIBDIR: lib/aarch64-linux-gnu
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            --no-install-recommends \
            bison \
            build-essential \
            ca-certificates \
            cmake \
            dpkg-dev \
            flex \
            glslang-tools \
            libclang-cpp-dev \
            libclang-dev \
            libdrm-dev \
            libelf-dev \
            libexpat1-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxrandr-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            llvm-dev \
            ninja-build \
            pkgconf \
            python3 \
            python3-mako \
            python3-packaging \
            python3-pip \
            python3-setuptools \
            python3-yaml \
            spirv-tools \
            zlib1g-dev
          
          LLVM_MAJOR="$(llvm-config --version | cut -d. -f1)"
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            --no-install-recommends \
            "libclc-${LLVM_MAJOR}-dev" \
            "libllvmspirvlib-${LLVM_MAJOR}-dev" \
            spirv-tools-dev
          
          python3 -m pip install --break-system-packages \
            'meson>=1.4.0,<2'

      - name: Configure minimal release build
        shell: bash
        run: |
          meson setup "${BUILD_DIR}" \
            --buildtype=release \
            --prefix=/usr \
            --libdir="${LIBDIR}" \
            -Db_ndebug=true \
            -Dbuild-tests=false \
            -Ddisplay-info=disabled \
            -Degl=disabled \
            -Denable-glcpp-tests=false \
            -Dgallium-drivers= \
            -Dgbm=disabled \
            -Dgles1=disabled \
            -Dgles2=disabled \
            -Dglx=disabled \
            -Dinstall-mesa-clc=false \
            -Dinstall-precomp-compiler=false \
            -Dlibunwind=disabled \
            -Dlmsensors=disabled \
            -Dllvm=enabled \
            -Dmesa-clc=enabled \
            -Dopengl=false \
            -Dpanfrost-kmds=kbase,panthor \
            -Dplatforms=x11 \
            -Dprecomp-compiler=enabled \
            -Dshared-glapi=disabled \
            -Dtools= \
            -Dvalgrind=disabled \
            -Dvideo-codecs= \
            -Dvulkan-drivers=panfrost \
            -Dvulkan-layers= \
            -Dxmlconfig=disabled \
            -Dzstd=disabled

      - name: Build with all available cores
        run: meson compile -C "${BUILD_DIR}" -j "$(nproc)"

      - name: Prepare tarball
        shell: bash
        run: |
          set -euo pipefail
          MESA_VERSION="$(tr -d '[:space:]' < VERSION)"
          ASSET_VERSION="${MESA_VERSION}-git${GITHUB_SHA:0:12}"
          BUNDLE_NAME="${PACKAGE_NAME}-${ASSET_VERSION}-aarch64"
          BUNDLE_ROOT="${GITHUB_WORKSPACE}/${BUNDLE_NAME}"
          
          mkdir -p "${BUNDLE_ROOT}/lib" \
            "${BUNDLE_ROOT}/share/vulkan/icd.d"
          
          # Copy the built library
          cp "${BUILD_DIR}/src/panfrost/vulkan/libvulkan_panfrost.so" \
            "${BUNDLE_ROOT}/lib/libvulkan_panfrost_kbase.so"
          strip --strip-unneeded \
            "${BUNDLE_ROOT}/lib/libvulkan_panfrost_kbase.so"
          
          # Generate ICD manifest
          python3 - \
            "${BUILD_DIR}/src/panfrost/vulkan/panfrost_icd.aarch64.json" \
            "${BUNDLE_ROOT}/share/vulkan/icd.d/panfrost_kbase_icd.aarch64.json" \
            "libvulkan_panfrost_kbase.so" <<'PY'
          import json
          import sys
          with open(sys.argv[1], encoding="utf-8") as source:
              manifest = json.load(source)
          manifest["ICD"]["library_path"] = sys.argv[3]
          with open(sys.argv[2], "w", encoding="utf-8") as output:
              json.dump(manifest, output, indent=4)
              output.write("\n")
          PY
          
          # Copy documentation
          cp docs/panvk-kbase.md "${BUNDLE_ROOT}/README.md"
          
          # Create environment setup script
          cat > "${BUNDLE_ROOT}/env.sh" <<'EOF'
          # Source this file from Bash: . ./env.sh
          PANVK_KBASE_ROOT="$(CDPATH= cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="${PANVK_KBASE_ROOT}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          export VK_DRIVER_FILES="${PANVK_KBASE_ROOT}/share/vulkan/icd.d/panfrost_kbase_icd.aarch64.json"
          EOF
          chmod 755 "${BUNDLE_ROOT}/env.sh"
          
          # Create tarball
          PACKAGE_FILE="${BUNDLE_NAME}.tar.gz"
          tar -C "${GITHUB_WORKSPACE}" -czf "${PACKAGE_FILE}" "${BUNDLE_NAME}"
          
          echo "PACKAGE_FILE=${PACKAGE_FILE}" >> "${GITHUB_ENV}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-panvk-kbase-ubuntu2404-aarch64
          path: ${{ github.workspace }}/${{ env.PACKAGE_FILE }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Meson logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesa-panvk-kbase-ubuntu2404-logs
          path: ${{ github.workspace }}/${{ env.BUILD_DIR }}/meson-logs
          if-no-files-found: ignore
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: build-packages
    if: >-
      startsWith(github.ref, 'refs/tags/kbase-v') ||
      inputs.release_tag != ''
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: mesa-panvk-kbase-*-aarch64
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | \
            xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/kbase-v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${REQUESTED_TAG}"
          fi
          
          mapfile -t ASSETS < <(find release-assets -maxdepth 1 -type f -print | sort)
          
          if gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "PanVK kbase ${RELEASE_TAG}" \
              --notes-file .github/panvk-kbase-release-notes.md
            gh release upload "${RELEASE_TAG}" "${ASSETS[@]}" \
              --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${ASSETS[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "PanVK kbase ${RELEASE_TAG}" \
              --notes-file .github/panvk-kbase-release-notes.md
          fi
