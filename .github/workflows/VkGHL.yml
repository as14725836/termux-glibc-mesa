name: Build VkGHL (ARM64 Native)

on:
  workflow_dispatch:

jobs:
  build-vkghl:
    runs-on: ubuntu-22.04-arm
    steps:
      # ============================================
      # 1) 原生 ARM64 环境，直接 apt 安装所有依赖
      # ============================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake python3 git python3-pip \
            libvulkan-dev \
            vulkan-validationlayers-dev \
            libjsoncpp-dev
          pip3 install --upgrade pyparsing
          
          # Ubuntu 的 vulkan-validationlayers-dev 将 generated/* 平铺在 vulkan/ 中
          # 而 layer_factory 期望 generated/ 子目录，创建符号链接
          sudo mkdir -p /usr/include/vulkan/generated
          for f in /usr/include/vulkan/vk_dispatch_table_helper.h \
                   /usr/include/vulkan/vk_enum_string_helper.h \
                   /usr/include/vulkan/vk_extension_helper.h \
                   /usr/include/vulkan/vk_layer_dispatch_table.h \
                   /usr/include/vulkan/vk_object_types.h \
                   /usr/include/vulkan/vk_safe_struct.h \
                   /usr/include/vulkan/vk_typemap_helper.h; do
            [ -f "$f" ] && sudo ln -sf "$f" /usr/include/vulkan/generated/
          done

      # ============================================
      # 2) 编译 Vulkan-Headers（apt 的 libvulkan-dev 不提供 VulkanHeadersConfig.cmake）
      #     使用 v1.3.261，与 413b473^ (2023.8) 兼容，避免 ohos 等新平台问题
      # ============================================
      - name: Build Vulkan-Headers
        run: |
          git clone --branch v1.3.261 --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git
          cd Vulkan-Headers
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/tmp/vk_headers
          make -j$(nproc) install

      # ============================================
      # 3) 克隆 Vulkan-ValidationLayers 源码（仅头文件，apt 包缺少 containers/ 等内部头文件）
      #     使用 v1.3.261，与 413b473^ 兼容
      # ============================================
      - name: Fetch ValidationLayers Headers
        run: |
          git clone --branch v1.3.261 --depth 1 https://github.com/KhronosGroup/Vulkan-ValidationLayers.git /tmp/vk_vl_src

      # ============================================
      # 4) VulkanTools 旧版 (包含 layer_factory) + VkGHL
      # ============================================
      - name: Prepare VulkanTools & VkGHL
        run: |
          git clone https://github.com/LunarG/VulkanTools.git
          cd VulkanTools
          # 回到移除 layer_factory 之前的最后一个 commit
          git checkout 413b473^
          
          # 修补：新版 Vulkan-Headers 引入 ohos 平台，旧版 common_codegen.py 不识别
          sed -i "s/'prospero': \"VK_USE_PLATFORM_OHOS\"/'prospero': \"VK_USE_PLATFORM_OHOS\",\n    'ohos': \"VK_USE_PLATFORM_OHOS\"/" scripts/common_codegen.py
          
          # 清空示例层，放入 VkGHL
          rm -rf layer_factory/demo_layer layer_factory/starter_layer
          git clone https://github.com/pchome/VkGHL layer_factory/VkGHL

      # ============================================
      # 4) 原生编译 VkGHL
      # ============================================
      - name: Build VkGHL
        run: |
          cd VulkanTools
          mkdir build && cd build
          
          cmake .. \
            -DCMAKE_PREFIX_PATH="/tmp/vk_headers;/usr" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-I/tmp/vk_vl_src -I/tmp/vk_vl_src/layers" \
            -DVULKAN_HEADERS_INSTALL_DIR=/tmp/vk_headers \
            -DVULKAN_LOADER_INSTALL_DIR=/usr \
            -DVULKAN_VALIDATIONLAYERS_INSTALL_DIR=/usr \
            -DBUILD_WSI_XCB_SUPPORT=OFF \
            -DBUILD_WSI_XLIB_SUPPORT=OFF \
            -DBUILD_WSI_WAYLAND_SUPPORT=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_APIDUMP=OFF \
            -DBUILD_MONITOR=OFF \
            -DBUILD_SCREENSHOT=OFF \
            -DBUILD_VIA=OFF \
            -DBUILD_LAYERMGR=OFF \
            -DVkLayer_VkGHL_INSTALL_DIR=/usr/lib
          
          make -j$(nproc) VkLayer_VkGHL

      # ============================================
      # 5) 收集产物
      # ============================================
      - name: Collect Artifacts
        run: |
          mkdir -p output
          find VulkanTools/build -name "libVkLayer_VkGHL.so" -exec cp {} output/ \;
          find VulkanTools/build -name "VkLayer_VkGHL.json" -exec cp {} output/ \;
          file output/libVkLayer_VkGHL.so

      - uses: actions/upload-artifact@v4
        with:
          name: vkghl-arm64
          path: output/
